name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level=high

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm test

      - run: pnpm --filter @jhsc/web build

  e2e:
    name: e2e (chromium)
    runs-on: ubuntu-latest
    # actions: write is defensive for upload-artifact@v7 on the
    # if: failure() step below — the v4+ artifact backend's permission
    # requirements aren't documented in upload-artifact's README,
    # MIGRATION.md, or GitHub's token-auth docs. The conditional gate
    # means CI never exercises this path, so we cover it preventively.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @jhsc/web exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: pnpm --filter @jhsc/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  docker:
    name: docker build
    runs-on: ubuntu-latest
    # actions: write is required for docker/build-push-action's
    # cache-to: type=gha (Actions cache scope writes); not for
    # arbitrary Actions API usage.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build api image
        uses: docker/build-push-action@v7
        with:
          # Repo-root context because the api now depends on workspace
          # packages (@jhsc/audit, @jhsc/crypto, @jhsc/legal-corpus,
          # @jhsc/shared-types). The Dockerfile is monorepo-aware.
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: jhsc-worker-hub-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build ai-proxy image
        uses: docker/build-push-action@v7
        with:
          context: apps/ai-proxy
          file: apps/ai-proxy/Dockerfile
          push: false
          tags: jhsc-worker-hub-ai-proxy:ci
          cache-from: type=gha,scope=ai-proxy
          cache-to: type=gha,mode=max,scope=ai-proxy
