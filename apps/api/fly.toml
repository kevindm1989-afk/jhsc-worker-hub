# Fly.io configuration for the api service.
#
# App name is a placeholder — `fly launch` will reconcile against what's
# available. Region is YYZ (Toronto) per ARCHITECTURE.md.
#
# Secrets are NOT in this file. Set them via:
#   fly secrets set DATABASE_URL=postgres://...
#   fly secrets set MASTER_KEY=...
# Wiring for DATABASE_URL (Neon) and MASTER_KEY lands in milestones 1.2
# (auth) and 1.3 (encryption/audit).

app = "jhsc-worker-hub-api"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
